# Static hosting for meme GIFs + memes.json (HTTPS via certbot).
# Docroot: /var/www/meme-static
# URLs:    https://de.hansenh.xyz/meme/<file>.gif
#          https://de.hansenh.xyz/memes.json

server {
    listen 80;
    listen [::]:80;
    server_name de.hansenh.xyz;

    root /var/www/meme-static;

    # No directory listings
    autoindex off;

    # Allow certbot (and renewals) to answer HTTP-01 challenges
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        allow all;
    }

    location = /memes.json {
        default_type application/json;
        add_header Cache-Control "public, max-age=300";
    }

    location /meme/ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    location / {
        return 404;
    }
}
